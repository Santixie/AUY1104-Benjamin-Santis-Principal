name: Deploy API to Docker Hub

on:
  workflow_call:                   # - Permite ser llamado por otros repos
    secrets:
      DOCKER_USERNAME:
        required: true             # - El caller DEBE pasar este secreto
      DOCKER_PASSWORD:
        required: true             # - El caller DEBE pasar este secreto
  workflow_dispatch:               # - Permite ejecución manual desde GitHub UI

jobs:
  run-inline-script:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Credenciales de Docker Hub
      - name: Configure Docker Hub Credentials
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-api:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/my-api:${{ github.sha }} \
                    ${{ secrets.DOCKER_USERNAME }}/my-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/my-api:latest